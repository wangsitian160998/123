    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-alt: #eef3f6;
      --text: #18242d;
      --muted: #5f717d;
      --line: #d3dde5;
      --accent: #0f7a70;
      --accent-soft: #def4f1;
      --blue: #1a78a6;
      --blue-soft: #dff1f8;
      --amber: #a86f00;
      --amber-soft: #fff1d6;
      --red: #b43d3d;
      --red-soft: #fde6e6;
      --shadow: 0 14px 34px rgba(24, 36, 45, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button, input, select {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .topband {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .topband h1 {
      margin: 0;
      font-size: 28px;
    }

    .topband p {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 760px;
    }

    .toolbar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.5fr 1.1fr 1fr;
      gap: 14px;
    }

    .toolbar-block,
    .section,
    .stat,
    .item-card,
    .detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar-block {
      padding: 14px;
      min-height: 116px;
    }

    .toolbar-title,
    .section-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .chip,
    .ghost-btn,
    .solid-btn {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .ghost-btn:hover,
    .solid-btn:hover,
    .chip:hover {
      border-color: var(--accent);
    }

    .solid-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 170px 140px;
      gap: 10px;
    }

    .control-row input,
    .control-row select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--text);
    }

    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat {
      padding: 16px;
      min-height: 118px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin: 8px 0 6px;
      font-size: 30px;
    }

    .stat small {
      color: var(--muted);
      font-size: 13px;
    }

    .stat.accent {
      background: #f4fbfa;
      border-color: #c5e7e1;
    }

    .stat.warn {
      background: #fff9ee;
      border-color: #f1dfb8;
    }

    .stat.risk {
      background: #fff7f7;
      border-color: #f1cfcf;
    }

    .main-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(320px, 0.9fr);
      gap: 16px;
      align-items: start;
    }

    .section {
      padding: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .item-list {
      display: grid;
      gap: 12px;
    }

    .item-card {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }

    .item-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.policy { background: var(--blue-soft); color: var(--blue); }
    .badge.sentiment { background: var(--accent-soft); color: var(--accent); }
    .badge.industry { background: #ece9fb; color: #6154a6; }
    .badge.media { background: #e6f1ff; color: #245eab; }
    .badge.priority-high { background: var(--red-soft); color: var(--red); }
    .badge.priority-mid { background: var(--amber-soft); color: var(--amber); }
    .badge.priority-low { background: #edf3ef; color: #466050; }

    .item-summary {
      margin: 0;
      color: var(--text);
    }

    .item-why {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .item-actions {
      display: grid;
      gap: 8px;
      min-width: 126px;
    }

    .detail-panel {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .detail-panel h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .detail-block {
      padding-top: 12px;
      border-top: 1px solid var(--line);
      margin-top: 12px;
    }

    .detail-block strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .detail-block p,
    .detail-block li {
      margin: 0;
      color: var(--text);
    }

    .detail-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .detail-links a {
      color: var(--blue);
      text-decoration: none;
      word-break: break-all;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    @media (max-width: 1100px) {
      .toolbar,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .control-row,
      .stats {
        grid-template-columns: 1fr;
      }

      .item-card {
        grid-template-columns: 1fr;
      }

      .item-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

    const categoryClassMap = {
      "政策": "policy",
      "行业": "industry",
      "媒体": "media"
    };

    const priorityLabelMap = {
      high: "高优先级",
      mid: "中优先级",
      low: "低优先级"
    };

    const priorityClassMap = {
      high: "priority-high",
      mid: "priority-mid",
      low: "priority-low"
    };

    let currentRange = "30";
    let currentCategory = "all";
    let currentSort = "desc";
    let currentSearch = "";
    let featuredOnly = false;
    let currentDetailId = weeklyItems[0]?.id ?? null;

    const itemList = document.getElementById("itemList");
    const detailPanel = document.getElementById("detailPanel");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const focusToggle = document.getElementById("focusToggle");

    function formatDate(dateString) {
      const date = new Date(dateString + "T00:00:00");
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function daysDiff(dateString) {
      const today = new Date();
      const date = new Date(dateString + "T00:00:00");
      const diff = today - date;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getFilteredItems() {
      let result = [...weeklyItems];

      if (currentRange !== "all") {
        const maxDays = Number(currentRange);
        result = result.filter((item) => daysDiff(item.date) <= maxDays);
      }

      if (currentCategory !== "all") {
        result = result.filter((item) => item.category === currentCategory);
      }

      if (featuredOnly) {
        result = result.filter((item) => item.featured);
      }

      if (currentSearch.trim()) {
        const keyword = currentSearch.trim().toLowerCase();
        result = result.filter((item) => {
          const haystack = [
            item.title,
            item.platform,
            item.source,
            item.summary,
            item.whyItMatters,
            item.nextAction,
            ...(item.tags || [])
          ].join(" ").toLowerCase();
          return haystack.includes(keyword);
        });
      }

      if (currentSort === "desc") {
        result.sort((a, b) => b.date.localeCompare(a.date));
      } else if (currentSort === "asc") {
        result.sort((a, b) => a.date.localeCompare(b.date));
      } else {
        const weight = { high: 3, mid: 2, low: 1 };
        result.sort((a, b) => {
          const diff = weight[b.priority] - weight[a.priority];
          return diff !== 0 ? diff : b.date.localeCompare(a.date);
        });
      }

      return result;
    }

    function renderStats(items) {
      document.getElementById("countAll").textContent = String(items.length);
      document.getElementById("countHigh").textContent = String(items.filter((item) => item.priority === "high").length);
      document.getElementById("latestDate").textContent = items.length ? formatDate(items[0].date) : "--";
    }

    function renderList(items) {
      if (!items.length) {
        itemList.innerHTML = '<div class="empty">当前筛选条件下没有内容，换一个时间范围或取消“仅看重点”试试。</div>';
        return;
      }

      itemList.innerHTML = items.map((item) => `
        <article class="item-card">
          <div>
            <h3>${item.title}</h3>
            <div class="item-meta">
              <span class="badge ${categoryClassMap[item.category]}">${item.category}</span>
              <span class="badge ${priorityClassMap[item.priority]}">${priorityLabelMap[item.priority]}</span>
              <span>${formatDate(item.date)}</span>
              <span>${item.platform}</span>
              <span>${item.source}</span>
            </div>
            <p class="item-summary">${item.summary}</p>
            <p class="item-why"><strong style="font-size:14px; color: var(--text);">为什么重要：</strong>${item.whyItMatters}</p>
            <div class="item-meta" style="margin-top: 12px;">
              ${(item.tags || []).map((tag) => `<span class="badge">${tag}</span>`).join("")}
            </div>
          </div>
          <div class="item-actions">
            <button class="ghost-btn" type="button" data-detail="${item.id}">查看详情</button>
            <button class="ghost-btn" type="button" data-copy="${item.id}">复制摘要</button>
          </div>
        </article>
      `).join("");
    }

    function renderDetail(item) {
      if (!item) {
        detailPanel.innerHTML = `
          <h2>没有可展示的详情</h2>
          <div class="detail-meta"><span>请先调整筛选条件或选择其他条目。</span></div>
        `;
        return;
      }

      detailPanel.innerHTML = `
        <h2>${item.title}</h2>
        <div class="detail-meta">
          <span class="badge ${categoryClassMap[item.category]}">${item.category}</span>
          <span class="badge ${priorityClassMap[item.priority]}">${priorityLabelMap[item.priority]}</span>
          <span>${formatDate(item.date)}</span>
          <span>${item.platform}</span>
          <span>${item.source}</span>
        </div>
        <div class="detail-block">
          <strong>摘要</strong>
          <p>${item.summary}</p>
        </div>
        <div class="detail-block">
          <strong>为什么重要</strong>
          <p>${item.whyItMatters}</p>
        </div>
        <div class="detail-block">
          <strong>建议动作</strong>
          <p>${item.nextAction}</p>
        </div>
        <div class="detail-block">
          <strong>标签</strong>
          <p>${(item.tags || []).join("、") || "无"}</p>
        </div>
        <div class="detail-block">
          <strong>原始链接</strong>
          <div class="detail-links">
            ${item.links.length
              ? item.links.map((link) => `<a href="${link}" target="_blank" rel="noreferrer">${link}</a>`).join("")
              : "<span style='color: var(--muted);'>暂未填写</span>"
            }
          </div>
        </div>
      `;
    }

    function refresh() {
      const items = getFilteredItems();
      renderStats(items);
      renderList(items);

      if (!items.find((item) => item.id === currentDetailId)) {
        currentDetailId = items[0]?.id ?? null;
      }
      renderDetail(items.find((item) => item.id === currentDetailId));
    }

    document.getElementById("rangeChips").addEventListener("click", (event) => {
      const chip = event.target.closest("[data-range]");
      if (!chip) return;
      currentRange = chip.dataset.range;
      document.querySelectorAll("#rangeChips .chip").forEach((node) => node.classList.toggle("active", node === chip));
      refresh();
    });

    document.getElementById("categoryChips").addEventListener("click", (event) => {
      const chip = event.target.closest("[data-category]");
      if (!chip) return;
      currentCategory = chip.dataset.category;
      document.querySelectorAll("#categoryChips .chip").forEach((node) => node.classList.toggle("active", node === chip));
      refresh();
    });

    searchInput.addEventListener("input", () => {
      currentSearch = searchInput.value;
      refresh();
    });

    sortSelect.addEventListener("change", () => {
      currentSort = sortSelect.value;
      refresh();
    });

    focusToggle.addEventListener("click", () => {
      featuredOnly = !featuredOnly;
      focusToggle.textContent = featuredOnly ? "已开启重点模式" : "仅看重点";
      focusToggle.classList.toggle("solid-btn", featuredOnly);
      refresh();
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      currentRange = "30";
      currentCategory = "all";
      currentSort = "desc";
      currentSearch = "";
      featuredOnly = false;
      searchInput.value = "";
      sortSelect.value = "desc";
      focusToggle.textContent = "仅看重点";
      focusToggle.classList.remove("solid-btn");
      document.querySelectorAll("#rangeChips .chip").forEach((node) => node.classList.toggle("active", node.dataset.range === "30"));
      document.querySelectorAll("#categoryChips .chip").forEach((node) => node.classList.toggle("active", node.dataset.category === "all"));
      refresh();
    });

    itemList.addEventListener("click", async (event) => {
      const detailButton = event.target.closest("[data-detail]");
      const copyButton = event.target.closest("[data-copy]");

      if (detailButton) {
        currentDetailId = Number(detailButton.dataset.detail);
        refresh();
      }

      if (copyButton) {
        const item = weeklyItems.find((entry) => entry.id === Number(copyButton.dataset.copy));
        if (!item) return;
        const text = `${item.title}\n日期：${formatDate(item.date)}\n平台：${item.platform}\n来源：${item.source}\n摘要：${item.summary}\n为什么重要：${item.whyItMatters}\n建议动作：${item.nextAction}`;
        try {
          await navigator.clipboard.writeText(text);
          copyButton.textContent = "已复制";
          window.setTimeout(() => {
            copyButton.textContent = "复制摘要";
          }, 1200);
        } catch (error) {
          alert("浏览器未允许复制，请手动复制右侧详情。");
        }
      }
    });

    refresh();
  </script>
</body>
</html>
